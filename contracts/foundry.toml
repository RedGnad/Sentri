[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]

[rpc_endpoints]
galileo = "https://evmrpc-testnet.0g.ai"
og_mainnet = "https://evmrpc.0g.ai"

[etherscan]
galileo = { key = "${ETHERSCAN_API_KEY}", url = "https://chainscan-galileo.0g.ai/api" }
og_mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://chainscan.0g.ai/api" }
