[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
galileo = "https://evmrpc-testnet.0g.ai"

[etherscan]
galileo = { key = "${ETHERSCAN_API_KEY}", url = "https://chainscan-galileo.0g.ai/api" }
