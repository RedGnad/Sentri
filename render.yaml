# Render Blueprint for the Sentri multi-vault agent runtime.
# Connect this repo in Render → Blueprints → "New Blueprint Instance".
# Render auto-creates the service with the config below.
# Only PRIVATE_KEY is left blank — paste it manually in the Render UI
# (Environment tab) so it never lives in git.

services:
  - type: web
    name: sentri-agent
    runtime: node
    plan: free
    region: frankfurt
    autoDeploy: true
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter @steward/sdk run server
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PRIVATE_KEY
        sync: false
      # Phase 1 multi-tenant deployment on Galileo (May 2026).
      - key: NEXT_PUBLIC_VAULT_FACTORY_ADDRESS
        value: "0xE3cfFc08a8327b7464168a4C17D5AE609bE75153"
      - key: NEXT_PUBLIC_VAULT_IMPLEMENTATION_ADDRESS
        value: "0x7fDfbee09665fffEB150F500C2CC8326c87B6304"
      - key: NEXT_PUBLIC_AGENT_INFT_ADDRESS
        value: "0x3E74C5820e3DF83C331AC058328Dd18C037E151F"
      - key: NEXT_PUBLIC_SWAP_ROUTER_ADDRESS
        value: "0x13173a0F2BB4687F8b601374566649559511D512"
      - key: NEXT_PUBLIC_SWAP_PAIR_ADDRESS
        value: "0x1C8040c84344641cA4ab3CAE44c2B99c9ec1f137"
      - key: NEXT_PUBLIC_PRICE_FEED_ADDRESS
        value: "0xaDb52a49d0398cA048f4027Fe81748Dd666BAfF8"
      - key: NEXT_PUBLIC_MOCK_USDC_ADDRESS
        value: "0x93cA5b6fEA5328FAa0ed4B6Cb6a2E82339558792"
      - key: NEXT_PUBLIC_MOCK_WETH_ADDRESS
        value: "0xF25A225562808a00776aAAD4DFC98c6B48Ad5790"
      - key: NEXT_PUBLIC_DEMO_VAULT_ADDRESS
        value: "0x435946204b818e82C97362F21Ca8B967F5266F83"
      - key: AGENT_INTERVAL_MS
        value: "300000"
      - key: SENTRI_CACHE_DIR
        value: "/tmp/sentri-cache"
