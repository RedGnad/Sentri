# Render Blueprint for the Sentri multi-vault agent runtime.
# This default service is the Galileo rehearsal agent used for deterministic
# full-loop demos. Mainnet review mode uses the same code with Render env
# overrides (`SENTRI_NETWORK=mainnet`, `MARKET_ASSET=W0G`, USDC.E/W0G/Jaine
# addresses) so the public rehearsal service is not accidentally pointed at
# real liquidity.
# Connect this repo in Render → Blueprints → "New Blueprint Instance".
# Render auto-creates the service with the config below.
# Only PRIVATE_KEY is left blank — paste it manually in the Render UI
# (Environment tab) so it never lives in git.

services:
  - type: web
    name: sentri-agent
    runtime: node
    plan: free
    region: frankfurt
    autoDeploy: true
    branch: main
    buildCommand: corepack pnpm install --frozen-lockfile
    startCommand: corepack pnpm --filter @steward/sdk run server
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "20.20.2"
      - key: PRIVATE_KEY
        sync: false
      # Replay-protected multi-tenant deployment on Galileo (May 2026).
      - key: NEXT_PUBLIC_VAULT_FACTORY_ADDRESS
        value: "0x8a94F377De5450269e2035C8fAE31dE1E181F10e"
      - key: NEXT_PUBLIC_VAULT_IMPLEMENTATION_ADDRESS
        value: "0x2A33268CbB4a5639063331Db94FD94a8426765C0"
      - key: NEXT_PUBLIC_AGENT_INFT_ADDRESS
        value: "0x1181A8670d5CA9597D60fEf2A571a14C58F33020"
      - key: NEXT_PUBLIC_SWAP_ROUTER_ADDRESS
        value: "0xD58b37C4d838aad5E0734ba3F0d34DFA34186d7C"
      - key: NEXT_PUBLIC_SWAP_PAIR_ADDRESS
        value: "0x0BeC7F13a4E9DAc95954EcdF3FF2DABd8279700f"
      - key: NEXT_PUBLIC_PRICE_FEED_ADDRESS
        value: "0x0e75243d34E904Ab925064c8297b36484Ce2aB5E"
      - key: NEXT_PUBLIC_BASE_TOKEN_ADDRESS
        value: "0xAcd0cc301eB160aA8C19B02a9Fac9a1967A69bE3"
      - key: NEXT_PUBLIC_RISK_TOKEN_ADDRESS
        value: "0x246e6080D736A217C151C3b88890C08e2C249d5E"
      - key: NEXT_PUBLIC_DEMO_VAULT_ADDRESS
        value: "0x5Aa3a7083915F6213238fc8c7461be969d5504e2"
      - key: STORAGE_SUBMIT_FEE_WEI
        value: "1000000000000000"
      - key: AGENT_INTERVAL_MS
        value: "300000"
      - key: SENTRI_CACHE_DIR
        value: "/tmp/sentri-cache"
